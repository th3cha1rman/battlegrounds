{% extends "../main.html" %}

{% block title %}
    {% from tornado.options import options %}
    {{ options.game_name }}
{% end %}


{% block content %}

<link href="/static/css/map.css" rel="stylesheet">
<script src="/static/js/user-counter.js"></script>

<div class="map-background"></div>

<div style="position: relative; z-index: 1; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">
    <div style="background: rgba(10, 15, 25, 0.75); backdrop-filter: blur(8px); border: 1px solid rgba(69, 198, 219, 0.4); border-radius: 12px; padding: 35px 50px; text-align: center; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(69, 198, 219, 0.15);">
        <h1 style="color: #B6DADD; font-size: 42px; font-weight: 400; letter-spacing: 8px; margin: 0 0 5px; text-shadow: 0 0 20px #45c6db; text-transform: uppercase;">H3XSEC</h1>
        <h2 style="color: #7B848E; font-size: 18px; font-weight: 300; letter-spacing: 10px; margin: 0 0 20px; text-transform: uppercase; border-bottom: 1px solid rgba(69, 198, 219, 0.3); padding-bottom: 12px;">Battlegrounds</h2>
        
        <div style="display: flex; justify-content: center; gap: 40px; margin-bottom: 20px;">
            <div style="text-align: center;">
                <div style="color: #45c6db; font-size: 28px; font-weight: bold;" id="total-users">-</div>
                <div style="color: #8dbfca; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;">Total Users</div>
            </div>
            <div style="text-align: center;">
                <div style="color: #45c6db; font-size: 28px; font-weight: bold;" id="online-users">-</div>
                <div style="color: #8dbfca; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;">Online Now</div>
            </div>
        </div>
        
        <div style="border-top: 1px solid rgba(69, 198, 219, 0.2); padding-top: 15px; margin-top: 5px;">
            <div style="color: #7B848E; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px;">Next Operation In</div>
            <div style="display: flex; justify-content: center; gap: 15px;">
                <div style="text-align: center;">
                    <div style="color: #B6DADD; font-size: 24px; font-weight: bold;" id="days">30</div>
                    <div style="color: #698daa; font-size: 10px; text-transform: uppercase;">Days</div>
                </div>
                <div style="color: #45c6db; font-size: 24px;">:</div>
                <div style="text-align: center;">
                    <div style="color: #B6DADD; font-size: 24px; font-weight: bold;" id="hours">00</div>
                    <div style="color: #698daa; font-size: 10px; text-transform: uppercase;">Hours</div>
                </div>
                <div style="color: #45c6db; font-size: 24px;">:</div>
                <div style="text-align: center;">
                    <div style="color: #B6DADD; font-size: 24px; font-weight: bold;" id="minutes">00</div>
                    <div style="color: #698daa; font-size: 10px; text-transform: uppercase;">Mins</div>
                </div>
                <div style="color: #45c6db; font-size: 24px;">:</div>
                <div style="text-align: center;">
                    <div style="color: #B6DADD; font-size: 24px; font-weight: bold;" id="seconds">00</div>
                    <div style="color: #698daa; font-size: 10px; text-transform: uppercase;">Secs</div>
                </div>
            </div>
        </div>
    </div>
</div>

{% end %}
